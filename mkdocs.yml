site_name: Factorio Recipe Graph
site_description: A Python library for building hierarchical recipe dependency graphs for Factorio
site_url: https://lorencarvalho.github.io/factorio-recipe-graph/

exclude_docs: |
  README.md

repo_url: https://github.com/lorencarvalho/factorio-recipe-graph
repo_name: lorencarvalho/factorio-recipe-graph
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list

nav:
  - Home: index.md
  - Overview: overview.md
  - Installation and quick start: installation.md
  - Usage guide: usage.md
  - API reference: api.md
  - Worked examples: examples.md
  - Data pipeline: data_pipeline.md
  - Development and testing: development.md
